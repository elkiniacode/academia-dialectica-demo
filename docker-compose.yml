services:
  app-dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    profiles:
      - dev

  app-prod:
    build:
      context: .
      target: prod
      args:
        DATABASE_URL: ${DATABASE_URL}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST}
    ports:
      - "3000:3000"
    env_file:
      - .env
    profiles:
      - prod
